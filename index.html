<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Support — Strona w budowie</title>
<meta name="description" content="APEX Support Sp. z o.o. — technika i instalacje. Strona w budowie.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:hsl(24,10%,6%); --surface:hsl(24,8%,10%); --fg:hsl(30,15%,95%);
    --accent:hsl(20,95%,55%); --steel:hsl(208,25%,55%); --muted:hsl(24,5%,55%);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--fg);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:32px; overflow:hidden; position:relative;
  }
  /* blueprint grid */
  body::before{
    content:""; position:absolute; inset:0; opacity:.4; pointer-events:none;
    background-image:
      linear-gradient(hsl(30 15% 95% / .04) 1px, transparent 1px),
      linear-gradient(90deg, hsl(30 15% 95% / .04) 1px, transparent 1px);
    background-size:48px 48px;
    mask-image:radial-gradient(ellipse at center, #000 30%, transparent 75%);
  }
  /* accent glow */
  body::after{
    content:""; position:absolute; width:600px; height:600px; border-radius:50%;
    background:radial-gradient(circle, hsl(20 95% 55% / .10), transparent 70%);
    top:-15%; right:-10%; pointer-events:none;
  }
  .wrap{position:relative; z-index:1; max-width:560px; width:100%; text-align:left}
  .logo{margin-bottom:48px}
  .logo svg{width:260px; height:auto; display:block}
  .badge{
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid hsl(30 15% 95% / .18); border-radius:999px;
    padding:6px 14px; margin-bottom:24px;
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.18em;
    text-transform:uppercase; color:hsl(30 15% 95% / .7);
  }
  .badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 10px hsl(20 95% 55% / .8); animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  h1{
    font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:clamp(2.4rem,6vw,3.6rem);
    line-height:1.02; letter-spacing:-.03em; margin-bottom:20px;
  }
  h1 em{font-style:italic; font-weight:300; color:var(--accent)}
  p{font-size:1.05rem; line-height:1.65; color:hsl(30 15% 95% / .72); max-width:440px; margin-bottom:40px}
  .contact{
    display:flex; flex-wrap:wrap; gap:8px 28px; align-items:center;
    padding-top:28px; border-top:1px solid hsl(30 15% 95% / .1);
    font-size:14px;
  }
  .contact a{color:var(--steel); text-decoration:none}
  .contact a:hover{color:var(--fg)}
  .contact .lbl{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.2em;
    text-transform:uppercase; color:hsl(30 15% 95% / .4); margin-right:6px}
  .legal{margin-top:40px; font-family:'JetBrains Mono',monospace; font-size:10px;
    letter-spacing:.15em; text-transform:uppercase; color:hsl(30 15% 95% / .35); line-height:1.8}
  /* pomarańczowe kółko podążające za kursorem */
  .cursor-glow{
    position:fixed; top:0; left:0; width:26px; height:26px; border-radius:50%;
    border:1.5px solid var(--accent);
    box-shadow:0 0 16px hsl(20 95% 55% / .45), inset 0 0 8px hsl(20 95% 55% / .25);
    transform:translate(-50%,-50%); pointer-events:none; z-index:9999;
    opacity:0; transition:opacity .25s ease; will-change:transform; mix-blend-mode:screen;
  }
  .cursor-glow::after{
    content:""; position:absolute; top:50%; left:50%; width:5px; height:5px;
    border-radius:50%; background:var(--accent); transform:translate(-50%,-50%);
    box-shadow:0 0 8px hsl(20 95% 55% / .9);
  }
  @media (hover:none){ .cursor-glow{display:none} }
  @media (prefers-reduced-motion:reduce){ .cursor-glow{display:none} }
</style>
</head>
<body>
  <div class="wrap">

    <div class="logo">
      <!-- APEX.Support — pełny lockup (dark) -->
      <svg viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg" aria-label="APEX Support">
        <g>
          <path d="M18 86 L50 14 L82 86" stroke="hsl(30,15%,95%)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="32" y1="58" x2="68" y2="58" stroke="hsl(20,95%,55%)" stroke-width="6" stroke-linecap="round"/>
          <circle cx="50" cy="58" r="5.5" fill="hsl(20,95%,55%)"/>
        </g>
        <text x="115" y="58" font-family="Space Grotesk, sans-serif" font-weight="600" font-size="34" fill="hsl(30,15%,95%)" letter-spacing="-1.2">APEX</text>
        <text x="200" y="58" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="34" fill="hsl(20,95%,55%)" letter-spacing="-1.2">.</text>
        <text x="212" y="58" font-family="Space Grotesk, sans-serif" font-weight="600" font-size="34" fill="hsl(30,15%,95%)" letter-spacing="-1.2">Support</text>
        <text x="115" y="80" font-family="JetBrains Mono, monospace" font-size="9" fill="hsl(30,15%,95%)" fill-opacity="0.5" letter-spacing="2">TECHNIKA · INSTALACJE</text>
      </svg>
    </div>

    <div class="badge"><span class="dot"></span>Strona w budowie</div>

    <h1>Budujemy coś<br><em>solidnego.</em></h1>
    <p>Nasza nowa strona jest w przygotowaniu. W międzyczasie zapraszamy do bezpośredniego kontaktu.</p>

    <div class="contact">
      <span><span class="lbl">Mail</span><a href="mailto:biuro@apexs.pl">biuro@apexs.pl</a></span>
    </div>

    <div class="legal">
      APEX Support Sp. z o.o. · ul. Stanisławowska 47, 54-611 Wrocław · NIP 894 320 78 65
    </div>

  </div>

  <div class="cursor-glow" id="cursorGlow"></div>
  <script>
    (function(){
      var g = document.getElementById('cursorGlow');
      if(!g) return;
      var tx=0, ty=0, cx=0, cy=0, active=false;
      window.addEventListener('mousemove', function(e){
        tx=e.clientX; ty=e.clientY;
        if(!active){ active=true; cx=tx; cy=ty; g.style.opacity='1'; }
      });
      document.addEventListener('mouseleave', function(){ g.style.opacity='0'; });
      (function loop(){
        cx += (tx-cx)*0.18; cy += (ty-cy)*0.18;   // płynne podążanie z lekkim opóźnieniem
        g.style.transform = 'translate(' + cx + 'px,' + cy + 'px) translate(-50%,-50%)';
        requestAnimationFrame(loop);
      })();
    })();
  </script>
</body>
</html>
